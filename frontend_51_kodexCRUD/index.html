    <div class="productForm-container">
      <form id="productForm">
        <input name="name" class="productInput" type="text" placeholder="Product Name" />
        <input name="image" class="productInput" type="text" placeholder="Product Image Url" />
        <textarea name="description" class="productInput" placeholder="Product Description..."></textarea>
        <select name="category" class="productInput">
          <option value="">Select Category</option>
          <option value="fruits">Fruits & Vegetables</option>
          <option value="dairy">Dairy Products</option>
          <option value="beverages">Beverages</option>
          <option value="snacks">Snacks</option>
          <option value="household">Household Items</option>
        </select>
        <input name="price" class="productInput" type="number" placeholder="Price" />
        <input name="stock" class="productInput" type="number" placeholder="Stock Quantity" />
        <button id="submitBtn" type="submit">Add Product</button>
      </form>
