<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <div class="task1">
      <h4>## Task 1: Text Change on Button Click</h4>
      <div class="task">
        <p>Hello</p>
        <button class="btn" id="pBtn">click</button>
      </div>
    </div>
    <div class="task2">
      <h4>## Task 2: Change Box Color on Click</h4>
      <div class="task">
        <div class="color-box"></div>
        <button class="btn" id="boxColorChangeBtn">click</button>
      </div>
    </div>
    <div class="task3">
      <h4>## Task 3: Show and Hide a Box</h4>
      <div class="task">
        <div class="text-box">Show and Hide a Box</div>
        <button class="btn" id="showAndHideBtn">hidden</button>
      </div>
    </div>
    <div class="task4">
      <h4>## Task 4: Rotate a Box Using Buttons</h4>
      <div class="task">
        <div id="box"></div>
        <div class="two-btn">
          <button class="btn" id="leftBtn">Rotate left</button>
          <button class="btn" id="rightBtn">Rotate right</button>
        </div>
      </div>
    </div>
    <div class="task7">

    </div>
    <div class="task10">
      <h4>## Task 10: Traffic Light</h4>
      <div class="traffic-light">
        <div id="red" class="light "></div>
        <div id="yellow" class="light "></div>
        <div id="green" class="light"></div>
      </div>
      <div class="traffic-button">
        <button id="stop" class="trafficBtn stop">Stop</button>
        <button id="ready" class="trafficBtn ready">Ready</button>
        <button id="go" class="trafficBtn go">Go</button>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>

</html>
