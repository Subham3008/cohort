<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <div class="word-container">
      <div class="word-nav">
        <p id="home" class="active">Home</p>
        <p id="draw">Draw</p>
        <p id="design">Design</p>
        <p id="layout">Layout</p>
      </div>
      <div class="toolbar-items">
        <div class="toolbar" data-tab="home">
          <button id="bold">B</button>
          <button id="italic">I</button>
          <button id="underline">U</button>
          <button id="fontIncrease">F+</button>
          <button id="fontDecrease">F-</button>
        </div>
        <div class="toolbar" data-tab="draw">
          <button>Eraser</button>
          <button>pen1</button>
          <button>pen2</button>
          <button>pen3</button>
        </div>
        <div class="toolbar" data-tab="design">
          <button id="pageBorders">Page Borders</button>
          <button id="pageColor">Page Color</button>
        </div>
        <div class="toolbar" data-tab="layout">
          <button>Margins</button>
          <button>Size</button>
          <button>Orientation</button>
        </div>
      </div>
      <div class="word-pages">
        <div id="page" contenteditable="true">
          <!-- Start writing here... -->
        </div>
      </div>
    </div>
  </main>
  <div class="pageColor">
    <div class="colorNav">
      <h3>SELECT PAGE COLOR</h3>
      <i id="colorClose" class="ri-close-large-fill"></i>
    </div>
    <div class="allColor">
      <button class="color" data-color="red"></button>
      <button class="color" data-color="green"></button>
      <button class="color" data-color="lightgreen"></button>
      <button class="color" data-color="blue"></button>
      <button class="color" data-color="lightblue"></button>
      <button class="color" data-color="darkblue"></button>
      <button class="color" data-color="yellow"></button>
      <button class="color" data-color="lightyellow"></button>
      <button class="color" data-color="purple"></button>
      <button class="color" data-color="gray"></button>
      <button class="color" data-color="orange"></button>
      <button class="color" data-color="pink"></button>
      <button class="color" data-color="darkred"></button>
      <button class="color" data-color="violet"></button>


    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
