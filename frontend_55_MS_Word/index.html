<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <div class="word-container">
      <div class="word-nav">
        <p id="home" class="active">Home</p>
        <p id="draw">Draw</p>
        <p id="design">Design</p>
        <p id="layout">Layout</p>
      </div>
      <div class="toolbar-items">
        <div class="toolbar" data-tab="home">
          <button id="bold">B</button>
          <button id="italic">I</button>
          <button id="underline">U</button>
          <button id="fontIncrease">F+</button>
          <button id="fontDecrease">F-</button>
        </div>
        <div class="toolbar" data-tab="draw">
          <button id="eraser"><i class="fa-solid fa-eraser"></i></button>
          <button><i class="fa-solid fa-pen"></i></button>
          <button><i class="fa-solid fa-pencil"></i></button>
          <button><i class="fa-solid fa-pen" style="color:red;"></i></button>
          <!-- <button><i class="fa-solid fa-pen" style="color:green;"></i></button>
          <button><i class="fa-solid fa-pen" style="color:blue;"></i></button> -->
          <!-- <button><i class="fa-solid fa-paintbrush"></i></button> -->
        </div>
        <div class="toolbar" data-tab="design">
          <button id="pageBorders">Page Borders</button>
          <button id="pageColor">Page Color</button>
        </div>
        <div class="toolbar" data-tab="layout">
          <!-- <button>Margins</button> -->
          <select id="orientation">
            <option value="" selected disabled>Orientation</option>
            <option value="portrait">Portrait</option>
            <option value="landscape">Landscape</option>
          </select>
          <select id="pageSize">
            <option value="" selected disabled>Page Size</option>
            <option value="a3">A3</option>
            <option value="a4">A4</option>
            <option value="a5">A5</option>
            <option value="letter">Letter</option>
            <option value="legal">Legal</option>
          </select>
        </div>
      </div>
      <div class="word-pages">
        <div id="page" class="page">
          <div class="page-border" contenteditable="true">
            Start writing here...
          </div>
          <svg id="drawLayer"></svg>
        </div>
      </div>
    </div>
  </main>
  <div class="pageColor">
    <div class="colorNav">
      <h3>SELECT PAGE COLOR</h3>
      <i id="colorClose" class="ri-close-large-fill"></i>
    </div>
    <div class="allColor">
      <button class="color" data-color="white">Normal</button>
      <button class="color" data-color="red"></button>
      <button class="color" data-color="green"></button>
      <button class="color" data-color="lightgreen"></button>
      <button class="color" data-color="blue"></button>
      <button class="color" data-color="lightblue"></button>
      <button class="color" data-color="darkblue"></button>
      <button class="color" data-color="yellow"></button>
      <button class="color" data-color="lightyellow"></button>
      <button class="color" data-color="purple"></button>
      <button class="color" data-color="gray"></button>
      <button class="color" data-color="orange"></button>
      <button class="color" data-color="pink"></button>
      <button class="color" data-color="darkred"></button>
      <button class="color" data-color="violet"></button>
    </div>
  </div>
  <div class="border-panel">
    <div class="borderPanel-nav">
      <h3>SELECT BORDER STYLE</h3>
      <i id="borderClose" class="ri-close-large-fill"></i>
    </div>
    <div>
      <label>Border Style</label>
      <select id="borderStyle">
        <option value="solid">Solid</option>
        <option value="dashed">Dashed</option>
        <option value="dotted">Dotted</option>
        <option value="double">Double</option>
      </select>
    </div>

    <div>
      <label>Border Width</label>
      <input type="range" id="borderWidth" min="1" max="10" value="2">
    </div>

    <div>
      <label>Border Color</label>
      <input type="color" id="borderColor">
    </div>

  </div>

  <script src="script.js"></script>
</body>

</html>
