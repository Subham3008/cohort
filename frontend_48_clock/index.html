<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="main">
    <div id="container">
      <h1>DOOM CLOCK</h1>
      <p>This clock will run till the enternity</p>
      <div id="clock-container">
        <img src="./assets/clock-removebg-preview.png" alt="">
        <div class="hands">
          <div id="hHand"></div>
          <div id="mHand"></div>
          <div id="sHand"></div>
        </div>
      </div>
      <div class="digital-clock">
        <div id="hDigital">00</div>
        <span>:</span>
        <div id="mDigital">00</div>
        <span>:</span>
        <div id="sDigital">00 </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
