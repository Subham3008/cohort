<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <div class="bmi-container">
      <div class="bmi-claculator">
        <h2>BMI CALCULATOR</h2>
        <input type="number" id="height" placeholder="Enter your height (cm)" required>
        <input type="number" id="weight" placeholder="Enter your weight (kg)" required>
        <button class="btns calculateBtn" onclick="calculateBMI()">Calculate BMI</button>
        <button class="btns clearBtn" onclick="resetBMI()">Clear</button>
      </div>
      <div class="health-card">
        <h2>RESULT</h2>
        <p>YOUR BMI VALUE: <span id="bmi-value">0.00</span></p>
        <p>Health Category: <span id="health-category">Category</span></p>
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>

</html>
