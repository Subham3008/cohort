<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <div class="health-card">
      <p>Your BMI Value</p>
      <h2 id="bmi-value">0.00</h2>
      <h2 id="health-category">Health Category</h2>
    </div>
    <div class="bmi-claculator">
      <input type="number" id="height" placeholder="Enter your height (cm)">
      <input type="number" id="weight" placeholder="Enter your weight (kg)">
      <button onclick="calculateBMI()">Calculate BMI</button>
    </div>
  </main>
  <script src="script.js"></script>
</body>

</html>
