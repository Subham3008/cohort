<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI CALCULATOR</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>
  <main>
    <div class="bmi-container">
      <div class="bmi-claculator">
        <h2>BMI CALCULATOR</h2>
        <input type="text" id="name" placeholder="Enter your name" required>
        <input type="number" id="height" placeholder="Enter your height (cm)" required>
        <input type="number" id="weight" placeholder="Enter your weight (kg)" required>
        <button class="btns calculateBtn" onclick="calculateBMI()">Calculate BMI</button>
        <button class="btns clearBtn" onclick="resetBMI()">Clear</button>
      </div>
      <div class="health-card">
        <h2>RESULT</h2>
        <p>YOUR BMI VALUE: <span id="bmi-value">0.00</span></p>
        <p>HEALTH CATEGORY: <span id="health-category">Category</span></p>
      </div>
      <button class="btns historyBtn">YOUR BMI HISTORY</button>
    </div>
    <div class="bmiHistory">
      <div class="bmi-nav">
        <h2>PREVIOUS RESULT</h2>
        <i id="closeBtn" class="ri-close-large-fill"></i>
      </div>
      <div class="bmis">
        <!-- <div class="bmi">
          <h3>Subham Samanta</h3>
          <p>Height: <span>0.00</span>(cm)</p>
          <p>Weight: <span>000</span>(kg)</p>
          <p>Your BMI Value: <span>0.00</span></p>
          <p>Health Category: <span>Category</span></p>
          <p>Date: <span>00/00/0000</span></p>
          <button class="btns deleteBtn">Delete</button>
        </div> -->
      </div>
    </div>
  </main>
  <script src="script.js"></script>
</body>

</html>
